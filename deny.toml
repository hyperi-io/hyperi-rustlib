[graph]
targets = []
all-features = true

[advisories]
yanked = "warn"
# Transitive deps we cannot control — track upstream for resolution
ignore = [
    "RUSTSEC-2024-0384", # instant (via reqwest-retry → parking_lot 0.11)
    "RUSTSEC-2024-0436", # paste (dtolnay crate, widely used, no replacement)
]

[licenses]
allow = [
    "FSL-1.1-ALv2",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "CC0-1.0",
    "Artistic-2.0",
    "CDLA-Permissive-2.0",
    "BSL-1.0",
]

# Some crates don't have standard SPDX identifiers
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
