[graph]
targets = []
all-features = true

[advisories]
yanked = "warn"
ignore = []

[licenses]
allow = [
    "BUSL-1.1",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "CC0-1.0",
    "Artistic-2.0",
    "CDLA-Permissive-2.0",
    "BSL-1.0",
]

# Some crates don't have standard SPDX identifiers
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# Our own crate ships a combined LICENSE (BUSL-1.1 text + org annexures), so
# we use `license-file` rather than an SPDX `license` field. cargo-deny can't
# confidently match the combined file to the BUSL-1.1 template (score ~0.41)
# and flags the crate as unlicensed -- clarify that it is BUSL-1.1.
[[licenses.clarify]]
name = "hyperi-rustlib"
expression = "BUSL-1.1"
license-files = [{ path = "LICENSE", hash = 0x1d547099 }]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
