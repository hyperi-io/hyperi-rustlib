# Project:   hs-rustlib
# File:      Cargo.toml
# Purpose:   Rust shared library for HyperSec projects
# Language:  TOML
#
# License:   LicenseRef-HyperSec-EULA
# Copyright: (c) 2025 HyperSec

[package]
name = "hs-rustlib"
version = "0.2.0"
edition = "2021"
rust-version = "1.75"
description = "Shared utility library for HyperSec Rust applications"
license = "LicenseRef-HyperSec-EULA"
repository = "https://github.com/hypersec-io/hs-rustlib"
publish = ["hypersec"]
keywords = ["config", "logging", "metrics", "prometheus"]
categories = ["development-tools"]

[features]
default = ["config", "logger", "metrics", "env", "runtime"]

# Core features
env = []
runtime = ["dirs"]
config = ["figment", "dotenvy", "serde_yaml", "serde_json", "toml"]
logger = ["tracing", "tracing-subscriber", "owo-colors"]
metrics = ["dep:metrics", "metrics-exporter-prometheus", "sysinfo", "tokio"]

# Extended features (P2)
http = ["reqwest", "reqwest-middleware", "reqwest-retry"]
database = []
cache = []

# Transport features
transport = ["tokio", "async-trait", "serde_json", "rmp-serde", "chrono"]
transport-memory = ["transport"]
transport-kafka = ["transport", "rdkafka"]
transport-zenoh = ["transport", "zenoh"]
transport-all = ["transport-memory", "transport-kafka", "transport-zenoh"]

# Full feature set
full = ["config", "logger", "metrics", "env", "runtime", "http", "database", "cache", "transport-all"]

[dependencies]
# Serialisation (always needed)
serde = { version = "1.0", features = ["derive"] }

# Error handling
thiserror = "1.0"

# Environment detection
dirs = { version = "5.0", optional = true }

# Configuration
figment = { version = "0.10", features = ["yaml", "toml", "json", "env"], optional = true }
dotenvy = { version = "0.15", optional = true }
serde_yaml = { version = "0.9", optional = true }
serde_json = { version = "1.0", optional = true }
toml = { version = "0.8", optional = true }

# Logging
tracing = { version = "0.1", optional = true }
tracing-subscriber = { version = "0.3", features = ["json", "env-filter", "fmt", "time", "local-time"], optional = true }
time = { version = "0.3", optional = true }
owo-colors = { version = "4.0", optional = true }

# Metrics
metrics = { version = "0.23", optional = true }
metrics-exporter-prometheus = { version = "0.15", optional = true }
sysinfo = { version = "0.32", optional = true }

# Async runtime (for metrics server)
tokio = { version = "1.0", features = ["rt-multi-thread", "net", "sync", "time", "macros"], optional = true }

# HTTP client (P2)
reqwest = { version = "0.12", features = ["json"], optional = true }
reqwest-middleware = { version = "0.3", optional = true }
reqwest-retry = { version = "0.6", optional = true }

# Sync primitives
once_cell = "1.19"

# Async (for transport)
async-trait = { version = "0.1", optional = true }
chrono = { version = "0.4", optional = true }

# MessagePack (for transport)
rmp-serde = { version = "1.3", optional = true }

# Kafka transport
rdkafka = { version = "0.36", features = ["cmake-build"], optional = true }

# Zenoh transport
zenoh = { version = "1.1", optional = true }

[dev-dependencies]
tokio = { version = "1.0", features = ["full", "test-util"] }
tempfile = "3.10"
criterion = { version = "0.5", features = ["html_reports"] }
pretty_assertions = "1.4"

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
pedantic = "warn"
unwrap_used = "warn"
# expect_used = "warn"  # Disabled for MVP, re-enable for stricter error handling

[[bench]]
name = "config_benchmark"
harness = false

[[bench]]
name = "logger_benchmark"
harness = false
