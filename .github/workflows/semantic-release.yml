name: Semantic Release

on:
  # Only release after CI passes — prevents publishing broken code.
  # workflow_run fires when the named workflow completes on main.
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Create Version and Tag
    # Skip if CI failed (workflow_dispatch always runs)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}

      - name: Run semantic-release
        uses: ./ci/actions/release/semantic
        with:
          github-token: ${{ steps.app-token.outputs.token }}
