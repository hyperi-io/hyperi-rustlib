name: CI

on:
  push:
    branches: ["**"]
    paths-ignore:
      - ".claude/**"
      - ".cursor/**"
      - ".gemini/**"
      - "hyperi-ai/**"
      - "docs/**"
      - "**.md"
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        type: string
        required: true
        description: "Tag to publish (e.g. v1.20.1)"

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  ci:
    uses: hyperi-io/hyperi-ci/.github/workflows/rust-ci.yml@main
    with:
      publish-target: oss
      tag: ${{ inputs.tag || '' }}
    secrets: inherit
