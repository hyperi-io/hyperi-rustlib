name: CI

on:
  push:
    branches: ["**"]
    # Polars pattern: Trigger only when relevant files change
    paths:
      - 'src/**'
      - 'tests/**'
      - 'benches/**'
      - 'examples/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'clippy.toml'
      - 'rustfmt.toml'
      - 'deny.toml'
      - '.cargo/**'
      - '.github/workflows/ci.yml'
      - 'ci/**'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'benches/**'
      - 'examples/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'clippy.toml'
      - 'rustfmt.toml'
      - 'deny.toml'
      - '.cargo/**'
      - '.github/workflows/ci.yml'
      - 'ci/**'
  workflow_dispatch:

# Polars pattern: Cancel outdated runs when new commits push
# Essential for saving runner minutes on private repos
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Polars pattern: Disable debug symbols to reduce memory consumption
  # Critical for GitHub's 7GB runner limit during Rust compilation
  RUSTFLAGS: -C debuginfo=0
  RUST_BACKTRACE: 1

jobs:
  detect:
    name: Detect Config
    runs-on: ${{ vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}
    outputs:
      rust_coverage: ${{ steps.config.outputs.rust_coverage }}
    steps:
      - name: Generate token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ steps.token.outputs.token }}
      - uses: ./ci/actions/setup/detect-build-config
        id: config
        with:
          scripts-path: ./ci/scripts

  quality:
    name: Quality
    needs: detect
    runs-on: ${{ vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}
    steps:
      - name: Generate token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ steps.token.outputs.token }}
      - uses: ./ci/actions/jobs/quality
        with:
          language: rust
          artifactory-url: ${{ vars.ARTIFACTORY_CARGO_URL }}
          artifactory-username: ${{ secrets.ARTIFACTORY_CI_USERNAME }}
          artifactory-password: ${{ secrets.ARTIFACTORY_CI_TOKEN }}
      - name: Commit auto-fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'docs: auto-fix markdown formatting [skip ci]'
          file_pattern: '**/*.md'

  test:
    name: Test
    needs: [detect, quality]
    runs-on: ${{ vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}
    steps:
      - name: Generate token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ steps.token.outputs.token }}
      - uses: ./ci/actions/jobs/test
        with:
          language: rust
          artifactory-url: ${{ vars.ARTIFACTORY_CARGO_URL }}
          artifactory-username: ${{ secrets.ARTIFACTORY_CI_USERNAME }}
          artifactory-password: ${{ secrets.ARTIFACTORY_CI_TOKEN }}
