name: CI

on:
  push:
    branches: ["**"]
    paths-ignore:
      - ".claude/**"
      - ".cursor/**"
      - ".gemini/**"
      - "hyperi-ai/**"
      - "docs/**"
      - "**.md"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    uses: hyperi-io/hyperi-ci/.github/workflows/rust-ci.yml@main
    with:
      publish-target: oss
    secrets:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}
      GITLEAKS_GH_ACTIONS_KEY: ${{ secrets.GITLEAKS_GH_ACTIONS_KEY }}
