name: CI

on:
  push:
    branches: ["**"]
    paths-ignore:
      - ".claude/**"
      - ".cursor/**"
      - ".gemini/**"
      - "hyperi-ai/**"
      - "docs/**"
      - "**.md"
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        type: string
        required: false
        default: ""
        description: "Tag to re-publish (existing tag). Omit + set from-head to release HEAD."
      from-head:
        type: string
        required: false
        default: ""
        description: "'true' to release/retry the current HEAD - the CI creates the tag (issue #35)."
      bump:
        type: string
        required: false
        default: "auto"
        description: "Version resolution for from-head: auto | patch | minor (forced - release even with no release-worthy commit) | X.Y.Z (exact version)."

permissions:
  contents: write
  issues: write
  packages: write
  pull-requests: write

jobs:
  ci:
    uses: hyperi-io/hyperi-ci/.github/workflows/rust-ci.yml@main
    with:
      publish-target: oss
      tag: ${{ inputs.tag || '' }}
      from-head: ${{ inputs.from-head || '' }}
      bump: ${{ inputs.bump || 'auto' }}
    secrets: inherit
