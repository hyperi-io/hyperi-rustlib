# HyperI CI Configuration
# Generated by: attach.sh
# Documentation: https://github.com/hyperi-io/ci/blob/main/docs/CONFIGURATION.md
#
# Configuration precedence (highest wins):
#   1. Environment variables (HYPERCI_*)
#   2. This file (.hyperi-ci.yaml)
#   3. ci/defaults.yaml (CI defaults)

# Project language (auto-detected if not specified)
# Values: python, typescript, golang, rust, none
language: rust

# Runner settings
runners:
  default: arc-runner-16cpu

# Quality checks
quality:
  enabled: true

# Testing
test:
  enabled: true
  coverage: true
  # min_coverage: 80       # Fail if coverage below this percentage

# Building
build:
  enabled: true
  strategies:
    - native

# Publishing (on release)
publish:
  enabled: true
  # binaries: both         # Binary publish destination: artifactory, github, both
  # binaries_repo: hyperi-binaries  # JFrog Generic repo for binaries
